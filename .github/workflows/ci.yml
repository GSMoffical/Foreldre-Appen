name: CI

on:
  push:
    branches:
      - main
  pull_request:

defaults:
  run:
    working-directory: .

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Diagnose environment
        run: |
          node -v
          npm -v
          pwd
          ls -la
          test -f package.json
          test -f package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Diagnose environment
        run: |
          node -v
          npm -v
          pwd
          ls -la
          test -f package.json
          test -f package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs:
      - test
      - build
    env:
      E2E_LOGIN_EMAIL: ${{ secrets.E2E_LOGIN_EMAIL }}
      E2E_LOGIN_PASSWORD: ${{ secrets.E2E_LOGIN_PASSWORD }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_TANKESTROM_ANALYZE_URL: ${{ secrets.VITE_TANKESTROM_ANALYZE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Diagnose environment
        run: |
          node -v
          npm -v
          pwd
          ls -la
          test -f package.json
          test -f package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Check E2E env presence (safe)
        run: |
          echo "has E2E_LOGIN_EMAIL: $([ -n "${E2E_LOGIN_EMAIL}" ] && echo yes || echo no)"
          echo "has E2E_LOGIN_PASSWORD: $([ -n "${E2E_LOGIN_PASSWORD}" ] && echo yes || echo no)"
          echo "has VITE_SUPABASE_URL: $([ -n "${VITE_SUPABASE_URL}" ] && echo yes || echo no)"
          echo "has VITE_SUPABASE_ANON_KEY: $([ -n "${VITE_SUPABASE_ANON_KEY}" ] && echo yes || echo no)"
          echo "has VITE_TANKESTROM_ANALYZE_URL: $([ -n "${VITE_TANKESTROM_ANALYZE_URL}" ] && echo yes || echo no)"

      - name: Run Playwright E2E
        run: npx playwright test e2e/tankestrom-vaacup.spec.ts e2e/tankestrom-hostcup.spec.ts

      - name: Upload playwright-report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload test-results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          if-no-files-found: ignore
