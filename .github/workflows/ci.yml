name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    working-directory: .

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

  # PR-rask e2e: kun mobile-chrome (chromium). Cacher Playwright-browsere så
  # `npx playwright install --with-deps` ikke kjøres på hver PR. Full matrise
  # med mobile-safari/webkit kjøres i e2e-full-workflowen (push main, nightly,
  # workflow_dispatch, eller PR som rører e2e/**/Tankestrøm UI).
  e2e-fast:
    runs-on: ubuntu-latest
    needs:
      - test
      - build
    env:
      E2E_LOGIN_EMAIL: ${{ secrets.E2E_LOGIN_EMAIL }}
      E2E_LOGIN_PASSWORD: ${{ secrets.E2E_LOGIN_PASSWORD }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_TANKESTROM_ANALYZE_URL: ${{ secrets.VITE_TANKESTROM_ANALYZE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Read Playwright version (for cache key)
        id: pw
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-browsers-${{ runner.os }}-${{ steps.pw.outputs.version }}-chromium-v1

      - name: Install Playwright (chromium only)
        # Chromium på Ubuntu trenger sjelden ekstra apt-deps; vi dropper
        # `--with-deps` med vilje for å spare 3–5 min. Hvis cache traff,
        # er dette nesten gratis.
        run: |
          if [ "${{ steps.pw-cache.outputs.cache-hit }}" = "true" ]; then
            echo "Browsers cache hit — skipping download"
          else
            npx playwright install chromium
          fi

      - name: Check E2E env presence (safe)
        run: |
          echo "has E2E_LOGIN_EMAIL: $([ -n "${E2E_LOGIN_EMAIL}" ] && echo yes || echo no)"
          echo "has E2E_LOGIN_PASSWORD: $([ -n "${E2E_LOGIN_PASSWORD}" ] && echo yes || echo no)"
          echo "has VITE_SUPABASE_URL: $([ -n "${VITE_SUPABASE_URL}" ] && echo yes || echo no)"
          echo "has VITE_SUPABASE_ANON_KEY: $([ -n "${VITE_SUPABASE_ANON_KEY}" ] && echo yes || echo no)"
          echo "has VITE_TANKESTROM_ANALYZE_URL: $([ -n "${VITE_TANKESTROM_ANALYZE_URL}" ] && echo yes || echo no)"

      - name: Run Playwright E2E (mobile-chrome only)
        run: npx playwright test e2e/tankestrom-vaacup.spec.ts e2e/tankestrom-hostcup.spec.ts --project=mobile-chrome

      - name: Upload playwright-report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-fast
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload test-results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-fast
          path: test-results/
          if-no-files-found: ignore
