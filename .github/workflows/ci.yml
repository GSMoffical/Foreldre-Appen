name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    working-directory: .

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

  # PR-rask e2e: kun mobile-chrome (chromium). Kjører i samme Playwright-container
  # som e2e-full — browsere er forhåndsinstallert, ingen nedlasting i CI.
  # Full matrise (mobile-safari/webkit) kjøres i e2e-full-workflowen.
  e2e-fast:
    runs-on: ubuntu-latest
    # Container må holdes i sync med @playwright/test i package-lock.json.
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-jammy
      options: --user 1001
    timeout-minutes: 15
    needs:
      - test
      - build
    env:
      E2E_LOGIN_EMAIL: ${{ secrets.E2E_LOGIN_EMAIL }}
      E2E_LOGIN_PASSWORD: ${{ secrets.E2E_LOGIN_PASSWORD }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_TANKESTROM_ANALYZE_URL: ${{ secrets.VITE_TANKESTROM_ANALYZE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify Playwright browsers (preinstalled in container)
        run: |
          set -euo pipefail
          INSTALLED="$(node -p "require('@playwright/test/package.json').version")"
          echo "Installed @playwright/test: $INSTALLED"
          if [ "$INSTALLED" != "1.58.2" ]; then
            echo "::warning::Container er pinnet til v1.58.2 men lock-fila har $INSTALLED — oppdater container-tag i ci.yml (e2e-fast)."
          fi
          npx playwright --version
          ls -la /ms-playwright/
          if ! ls -d /ms-playwright/chromium-* >/dev/null 2>&1; then
            echo "::error::Chromium mangler i Playwright-containeren"
            exit 1
          fi

      - name: Check E2E env presence (safe)
        run: |
          echo "has E2E_LOGIN_EMAIL: $([ -n "${E2E_LOGIN_EMAIL}" ] && echo yes || echo no)"
          echo "has E2E_LOGIN_PASSWORD: $([ -n "${E2E_LOGIN_PASSWORD}" ] && echo yes || echo no)"
          echo "has VITE_SUPABASE_URL: $([ -n "${VITE_SUPABASE_URL}" ] && echo yes || echo no)"
          echo "has VITE_SUPABASE_ANON_KEY: $([ -n "${VITE_SUPABASE_ANON_KEY}" ] && echo yes || echo no)"
          echo "has VITE_TANKESTROM_ANALYZE_URL: $([ -n "${VITE_TANKESTROM_ANALYZE_URL}" ] && echo yes || echo no)"

      - name: Run Playwright E2E (mobile-chrome only)
        timeout-minutes: 8
        run: npx playwright test e2e/tankestrom-vaacup.spec.ts e2e/tankestrom-hostcup.spec.ts --project=mobile-chrome

      - name: Upload playwright-report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-fast
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload test-results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-fast
          path: test-results/
          if-no-files-found: ignore
